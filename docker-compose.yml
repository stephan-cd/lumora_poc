version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumora-postgres
    environment:
      POSTGRES_USER: lumora
      POSTGRES_PASSWORD: lumorapassword
      POSTGRES_DB: lumora_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumora-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
